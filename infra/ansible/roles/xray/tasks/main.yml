---
- name: Verify supported platform
  ansible.builtin.assert:
    that:
      - ansible_system == "Linux"
      - ansible_service_mgr == "systemd"
      - ansible_os_family == "Debian"
      - xray_archive_arch | length > 0
      - xray_client_id | length > 0
      - xray_reality_private_key | length > 0
      - xray_reality_short_ids | length > 0
    fail_msg: "Unsupported host or missing required Xray variables for {{ inventory_hostname }}"

- name: Install Xray prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - unzip
    update_cache: true
    state: present

- name: Create Xray group
  ansible.builtin.group:
    name: "{{ xray_group }}"
    system: true

- name: Create Xray user
  ansible.builtin.user:
    name: "{{ xray_user }}"
    group: "{{ xray_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    home: /nonexistent

- name: Create Xray directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ xray_config_dir }}", mode: "0755" }
    - { path: "{{ xray_data_dir }}", mode: "0755" }
    - { path: "{{ xray_log_dir }}", owner: "{{ xray_user }}", group: "{{ xray_group }}", mode: "0750" }
    - { path: "{{ xray_runtime_dir }}", owner: "{{ xray_user }}", group: "{{ xray_group }}", mode: "0755" }
    - { path: "{{ xray_tmp_dir }}", mode: "0755" }

- name: Download Xray archive
  ansible.builtin.get_url:
    url: "{{ xray_download_url }}"
    dest: "{{ xray_tmp_dir }}/{{ xray_archive_name }}"
    mode: "0644"

- name: Extract Xray archive
  ansible.builtin.unarchive:
    src: "{{ xray_tmp_dir }}/{{ xray_archive_name }}"
    dest: "{{ xray_tmp_dir }}"
    remote_src: true

- name: Install Xray binary
  ansible.builtin.copy:
    src: "{{ xray_tmp_dir }}/xray"
    dest: "{{ xray_binary_path }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  notify: restart xray

- name: Install Xray geo data files
  ansible.builtin.copy:
    src: "{{ xray_tmp_dir }}/{{ item }}"
    dest: "{{ xray_data_dir }}/{{ item }}"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  loop:
    - geoip.dat
    - geosite.dat
  notify: restart xray

- name: Install Xray systemd service
  ansible.builtin.template:
    src: xray.service.j2
    dest: "{{ xray_service_path }}"
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart xray

- name: Deploy Xray configuration
  ansible.builtin.template:
    src: config.json.j2
    dest: "{{ xray_config_path }}"
    owner: root
    group: root
    mode: "0640"
    validate: "{{ xray_binary_path }} run -test -config %s"
  notify: restart xray

- name: Ensure Xray service is enabled and started
  ansible.builtin.systemd:
    name: "{{ xray_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
